# ============================================
# Mokka 酱的规则精选集
# 改这里加规则，GitHub Actions 每天自动同步上游
# ============================================

# --- 上游数据源 ---
upstream:
  blackmatrix7:
    repo: blackmatrix7/ios_rule_script
    branch: master
    # Loon 格式：rule/Loon/{name}/{name}.list
    # Clash 格式：rule/Clash/{name}/{name}.yaml

# --- 规则清单 ---
rules:
  # ---- AI 服务 ----

  - name: OpenAI
    description: ChatGPT / OpenAI API / DALL-E
    upstream: blackmatrix7
    loon_path: rule/Loon/OpenAI/OpenAI.list
    clash_path: rule/Clash/OpenAI/OpenAI.yaml

  - name: Claude
    description: Anthropic Claude
    upstream: blackmatrix7
    loon_path: rule/Loon/Claude/Claude.list
    clash_path: rule/Clash/Claude/Claude.yaml

  - name: Gemini
    description: Google Gemini AI
    upstream: blackmatrix7
    loon_path: rule/Loon/Gemini/Gemini.list
    clash_path: rule/Clash/Gemini/Gemini.yaml

  - name: Copilot
    description: Microsoft Copilot
    upstream: blackmatrix7
    loon_path: rule/Loon/Copilot/Copilot.list
    clash_path: rule/Clash/Copilot/Copilot.yaml

  # ---- 常用服务 ----

  - name: Google
    description: Google 通用服务
    upstream: blackmatrix7
    loon_path: rule/Loon/Google/Google.list
    clash_path: rule/Clash/Google/Google.yaml

  - name: YouTube
    description: YouTube 视频
    upstream: blackmatrix7
    loon_path: rule/Loon/YouTube/YouTube.list
    clash_path: rule/Clash/YouTube/YouTube.yaml

  - name: Twitter
    description: X / Twitter
    upstream: blackmatrix7
    loon_path: rule/Loon/Twitter/Twitter.list
    clash_path: rule/Clash/Twitter/Twitter.yaml

  - name: Telegram
    description: Telegram 即时通讯
    upstream: blackmatrix7
    loon_path: rule/Loon/Telegram/Telegram.list
    clash_path: rule/Clash/Telegram/Telegram.yaml

  - name: GitHub
    description: GitHub
    upstream: blackmatrix7
    loon_path: rule/Loon/GitHub/GitHub.list
    clash_path: rule/Clash/GitHub/GitHub.yaml

  - name: Microsoft
    description: Microsoft 通用服务
    upstream: blackmatrix7
    loon_path: rule/Loon/Microsoft/Microsoft.list
    clash_path: rule/Clash/Microsoft/Microsoft.yaml

  - name: Netflix
    description: Netflix 流媒体
    upstream: blackmatrix7
    loon_path: rule/Loon/Netflix/Netflix.list
    clash_path: rule/Clash/Netflix/Netflix.yaml

  - name: Spotify
    description: Spotify 音乐
    upstream: blackmatrix7
    loon_path: rule/Loon/Spotify/Spotify.list
    clash_path: rule/Clash/Spotify/Spotify.yaml

  # ---- 特殊分流 ----

  - name: Cryptocurrency
    description: 加密货币交易所（需非美国节点）
    upstream: blackmatrix7
    loon_path: rule/Loon/Cryptocurrency/Cryptocurrency.list
    clash_path: rule/Clash/Cryptocurrency/Cryptocurrency.yaml

  # ---- 游戏 ----

  - name: Steam
    description: Steam（含国服 CDN，建议下载直连）
    upstream: blackmatrix7
    loon_path: rule/Loon/Steam/Steam.list
    clash_path: rule/Clash/Steam/Steam.yaml

  - name: PlayStation
    description: PS5 PSN（国服下载直连）
    upstream: blackmatrix7
