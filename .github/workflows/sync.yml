name: Sync Rules

on:
  # 每天北京时间凌晨 04:00（UTC 20:00）自动运行
  schedule:
    - cron: "0 20 * * *"

  # 手动触发（在 GitHub Actions 页面点 Run workflow）
  workflow_dispatch:

  # push 到 main 分支且修改了配置或自定义规则时也触发
  push:
    branches: [main]
    paths:
      - config.yaml
      - 'rules/**/custom.list'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run sync
        run: python scripts/sync.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "zgwtm"
          git config user.email "510182810@qq.com"
          git add rules/
          git commit -m "sync: $(date -u '+%Y-%m-%d %H:%M') UTC"
          git pull --rebase origin main
          git push
